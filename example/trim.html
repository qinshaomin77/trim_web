<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRIM — Trajectory Refinement for Emission Modeling</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%230891b2'/><text y='.9em' font-size='72' font-family='sans-serif' font-weight='bold' fill='white' x='14'>T</text></svg>" />

  <!-- React + Babel from CDN (no Node.js needed) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f4f7f9; color: #0f2d3d; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f4f7f9; }
    ::-webkit-scrollbar-thumb { background: #d4e2ec; border-radius: 3px; }
    input::placeholder, textarea::placeholder { color: #a8c4d0; }
    .step-row:hover { background: #f0f5f8 !important; }
    .step-row { transition: background 0.12s; cursor: default; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const C = {
      canvas:   "#f4f7f9",
      white:    "#ffffff",
      panelAlt: "#f0f5f8",
      raised:   "#e8f0f5",
      border:   "#d4e2ec",
      borderMd: "#b8d0de",
      borderHi: "#7fb8d4",
      teal:     "#0891b2",
      tealLight:"#e0f2f7",
      tealMid:  "#38b2c8",
      tealDark: "#066080",
      green:    "#16a34a",
      greenBg:  "#dcfce7",
      greenMid: "#22c55e",
      red:      "#dc2626",
      redBg:    "#fee2e2",
      amber:    "#d97706",
      amberBg:  "#fef3c7",
      text:     "#0f2d3d",
      textMd:   "#3a5a70",
      textMute: "#7a9ab0",
      textHint: "#a8c4d0",
      shadow:   "rgba(8,145,178,0.10)",
    };

    const STEPS = [
      { id: "net_topology",         title: "NET Topology",          sub: "net.xml → topology tables",             optional: false, icon: "⬡" },
      { id: "xml2csv_fcd",          title: "FCD Parse",             sub: "fcd.xml → CSV trajectory",              optional: false, icon: "⇄" },
      { id: "identify_neighbors",   title: "Neighbor Detection",    sub: "spatial adjacency analysis",            optional: false, icon: "◎" },
      { id: "trip_split",           title: "Trip Segmentation",     sub: "assign trip_id per trajectory",         optional: false, icon: "⋯" },
      { id: "trim_postprocess",     title: "TRIM Optimize",         sub: "trajectory optimization & postprocess", optional: false, icon: "⚡" },
      { id: "fill_xy",              title: "XY Fill",               sub: "merge & interpolate coordinates",       optional: false, icon: "⊕" },
      { id: "ef_match",             title: "Emission Factor Match", sub: "EF lookup & vehicle class binding",     optional: false, icon: "◈" },
      { id: "emission_spatial_map", title: "Spatial Emission Map",  sub: "grid-based emission distribution",      optional: false, icon: "▦" },
      { id: "emission_compare",     title: "Emission Compare",      sub: "result vs ground truth analysis",       optional: false, icon: "≡" },
      { id: "sg_smooth",            title: "SG Smooth",             sub: "Savitzky-Golay filter",                 optional: true,  icon: "∿" },
      { id: "gt_standardize",       title: "GT Standardize",        sub: "normalize ground truth CSV",            optional: true,  icon: "⊞" },
    ];

    const POLLUTANTS = ["NOx", "PM2.5", "CO", "CO2", "THC"];
    const now = () => new Date().toLocaleTimeString("en-GB", { hour12: false });

    // ── Components ────────────────────────────────────────────

    function StatusDot({ status }) {
      const map = {
        green: { bg: C.greenMid, shadow: "0 0 0 3px #dcfce7" },
        red:   { bg: C.red,      shadow: "0 0 0 3px #fee2e2" },
        teal:  { bg: C.teal,     shadow: "0 0 0 3px #e0f2f7" },
        amber: { bg: C.amber,    shadow: "0 0 0 3px #fef3c7" },
        gray:  { bg: C.textHint, shadow: "none" },
      };
      const s = map[status] || map.gray;
      return <span style={{ display:"inline-block", width:9, height:9, borderRadius:"50%", background:s.bg, boxShadow:s.shadow, flexShrink:0, transition:"all 0.3s" }} />;
    }

    function Toggle({ checked, onChange }) {
      return (
        <button onClick={() => onChange(!checked)} style={{ width:38, height:21, borderRadius:11, background:checked?C.teal:C.raised, border:`1.5px solid ${checked?C.teal:C.borderMd}`, position:"relative", cursor:"pointer", transition:"all 0.2s", flexShrink:0, padding:0 }}>
          <span style={{ position:"absolute", top:2, left:checked?18:2, width:13, height:13, borderRadius:"50%", background:checked?"#fff":C.textHint, transition:"left 0.2s", display:"block", boxShadow:"0 1px 3px rgba(0,0,0,0.15)" }} />
        </button>
      );
    }

    function PillCheck({ label, checked, onChange }) {
      return (
        <button onClick={() => onChange(!checked)} style={{ padding:"5px 14px", borderRadius:20, border:`1.5px solid ${checked?C.teal:C.border}`, background:checked?C.tealLight:C.white, color:checked?C.tealDark:C.textMute, fontSize:12, fontFamily:"DM Mono, monospace", cursor:"pointer", transition:"all 0.15s", fontWeight:500 }}>
          {checked && <span style={{ marginRight:5, color:C.teal }}>✓</span>}{label}
        </button>
      );
    }

    function RadioPill({ label, checked, onClick }) {
      return (
        <button onClick={onClick} style={{ padding:"5px 16px", borderRadius:20, border:`1.5px solid ${checked?C.green:C.border}`, background:checked?C.greenBg:C.white, color:checked?C.green:C.textMute, fontSize:12, fontFamily:"DM Mono, monospace", cursor:"pointer", transition:"all 0.15s", fontWeight:500 }}>
          {label}
        </button>
      );
    }

    function SectionHead({ icon, children }) {
      return (
        <div style={{ display:"flex", alignItems:"center", marginBottom:16, paddingBottom:10, borderBottom:`1.5px solid ${C.tealLight}` }}>
          {icon && <span style={{ marginRight:8, fontSize:15 }}>{icon}</span>}
          <span style={{ fontFamily:"DM Sans, sans-serif", fontWeight:700, fontSize:12, letterSpacing:"0.12em", color:C.tealDark, textTransform:"uppercase" }}>{children}</span>
        </div>
      );
    }

    function InputRow({ label, dotColor, value, onChange, placeholder, onBrowse, onClear }) {
      const [focus, setFocus] = useState(false);
      return (
        <div style={{ display:"grid", gridTemplateColumns:"148px 1fr auto auto", alignItems:"center", gap:8, marginBottom:10 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <StatusDot status={dotColor} />
            <span style={{ color:C.textMd, fontSize:12, fontFamily:"DM Mono, monospace", fontWeight:500 }}>{label}</span>
          </div>
          <input value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
            onFocus={() => setFocus(true)} onBlur={() => setFocus(false)}
            style={{ border:`1.5px solid ${focus?C.teal:C.border}`, background:focus?C.white:C.panelAlt, color:C.text, padding:"7px 12px", fontSize:12, fontFamily:"DM Mono, monospace", outline:"none", borderRadius:6, width:"100%", transition:"all 0.15s", boxShadow:focus?`0 0 0 3px ${C.tealLight}`:"none" }}
          />
          <button onClick={onBrowse}
            style={{ padding:"7px 14px", background:C.white, border:`1.5px solid ${C.border}`, color:C.textMd, fontFamily:"DM Sans, sans-serif", fontSize:12, fontWeight:600, cursor:"pointer", borderRadius:6, transition:"all 0.15s", whiteSpace:"nowrap" }}
            onMouseEnter={e => { e.currentTarget.style.borderColor=C.teal; e.currentTarget.style.color=C.teal; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor=C.border; e.currentTarget.style.color=C.textMd; }}
          >Browse</button>
          <button onClick={onClear}
            style={{ padding:"7px 10px", background:C.white, border:`1.5px solid ${C.border}`, color:C.textHint, fontSize:14, cursor:"pointer", borderRadius:6, transition:"all 0.15s", lineHeight:1 }}
            onMouseEnter={e => { e.currentTarget.style.borderColor=C.red; e.currentTarget.style.color=C.red; e.currentTarget.style.background=C.redBg; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor=C.border; e.currentTarget.style.color=C.textHint; e.currentTarget.style.background=C.white; }}
          >✕</button>
        </div>
      );
    }

    function Btn({ children, onClick, disabled, variant="primary", small }) {
      const [hover, setHover] = useState(false);
      const v = {
        primary: { bg:hover&&!disabled?C.tealDark:C.teal, border:C.teal, color:"#fff", shadow:`0 2px 8px ${C.shadow}` },
        ghost:   { bg:hover&&!disabled?C.tealLight:C.white, border:C.borderMd, color:C.textMd, shadow:"none" },
        danger:  { bg:hover&&!disabled?C.redBg:C.white, border:C.red, color:C.red, shadow:"none" },
        resume:  { bg:hover&&!disabled?C.greenBg:C.white, border:C.green, color:C.green, shadow:"none" },
      }[variant];
      return (
        <button onClick={disabled?undefined:onClick} onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
          style={{ padding:small?"5px 14px":"8px 20px", background:v.bg, border:`1.5px solid ${v.border}`, color:v.color, fontFamily:"DM Sans, sans-serif", fontWeight:700, fontSize:small?11:13, letterSpacing:"0.04em", cursor:disabled?"not-allowed":"pointer", borderRadius:7, opacity:disabled?0.4:1, transition:"all 0.15s", boxShadow:disabled?"none":v.shadow, whiteSpace:"nowrap" }}
        >{children}</button>
      );
    }

    function StepBadge({ status }) {
      const cfg = {
        pending: { bg:C.canvas,  color:C.textHint, border:C.border,   label:"Pending" },
        running: { bg:C.amberBg, color:C.amber,    border:C.amber,    label:"Running" },
        done:    { bg:C.greenBg, color:C.green,    border:C.greenMid, label:"Done"    },
        error:   { bg:C.redBg,   color:C.red,      border:C.red,      label:"Error"   },
        skipped: { bg:C.canvas,  color:C.textHint, border:C.border,   label:"Skip"    },
      }[status] || { bg:C.canvas, color:C.textHint, border:C.border, label:"—" };
      return <span style={{ background:cfg.bg, color:cfg.color, border:`1.5px solid ${cfg.border}`, borderRadius:20, padding:"3px 12px", fontSize:11, fontFamily:"DM Mono, monospace", fontWeight:600 }}>{cfg.label}</span>;
    }

    function ProgressBar({ steps, stepStatus }) {
      const done  = steps.filter(s => stepStatus[s.id] === "done").length;
      const error = steps.filter(s => stepStatus[s.id] === "error").length;
      const total = steps.length;
      const pct   = total ? (done / total) * 100 : 0;
      return (
        <div style={{ background:C.white, border:`1px solid ${C.border}`, borderRadius:10, padding:"14px 20px", marginBottom:16, display:"flex", alignItems:"center", gap:20 }}>
          <div style={{ flex:1 }}>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:7 }}>
              <span style={{ color:C.textMd, fontSize:12, fontFamily:"DM Sans, sans-serif", fontWeight:600 }}>Pipeline Progress</span>
              <span style={{ color:C.teal, fontSize:12, fontFamily:"DM Mono, monospace" }}>{done} / {total}</span>
            </div>
            <div style={{ height:6, background:C.raised, borderRadius:3, overflow:"hidden" }}>
              <div style={{ height:"100%", width:`${pct}%`, borderRadius:3, background:error>0?`linear-gradient(90deg,${C.teal},${C.red})`:`linear-gradient(90deg,${C.teal},${C.green})`, transition:"width 0.5s ease" }} />
            </div>
          </div>
          <div style={{ display:"flex", gap:16 }}>
            {[{label:"Done",val:done,color:C.green},{label:"Errors",val:error,color:C.red}].map(({label,val,color}) => (
              <div key={label} style={{ textAlign:"center" }}>
                <div style={{ fontSize:18, fontWeight:700, color, fontFamily:"DM Sans, sans-serif" }}>{val}</div>
                <div style={{ fontSize:10, color:C.textMute, fontFamily:"DM Mono, monospace" }}>{label}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ── Main App ──────────────────────────────────────────────

    function App() {
      const [tab, setTab]           = useState("inputs");
      const [netXml, setNetXml]     = useState("");
      const [fcdInput, setFcdInput] = useState("");
      const [outDir, setOutDir]     = useState("");
      const [importGt, setImportGt] = useState(false);
      const [gtCsv, setGtCsv]       = useState("");
      const [prefix, setPrefix]     = useState("fcd");
      const [useSg, setUseSg]             = useState(false);
      const [enablePlots, setEnablePlots] = useState(false);
      const [plotLimit, setPlotLimit]     = useState("10");
      const [pollutants, setPollutants]   = useState({ NOx:true, "PM2.5":false, CO:false, CO2:false, THC:false });
      const [spatialAxis, setSpatialAxis] = useState("both");
      const [axisbin, setAxisbin]         = useState("10.0");
      const [enableRoi, setEnableRoi]       = useState(false);
      const [roiMode, setRoiMode]           = useState("shared");
      const [roiSim, setRoiSim]             = useState("");
      const [roiGt, setRoiGt]               = useState("");

      // Time filter states (NEW)
      const [enableSumoTime, setEnableSumoTime] = useState(false);
      const [sumoTimeStart, setSumoTimeStart]   = useState("");
      const [sumoTimeEnd, setSumoTimeEnd]       = useState("");
      const [enableGtTime, setEnableGtTime]     = useState(false);
      const [gtTimeStart, setGtTimeStart]       = useState("");
      const [gtTimeEnd, setGtTimeEnd]           = useState("");

      const [stepEnabled, setStepEnabled] = useState(Object.fromEntries(STEPS.map(s => [s.id, !s.optional])));
      const [stepStatus, setStepStatus]   = useState(Object.fromEntries(STEPS.map(s => [s.id, "pending"])));
      const [appStatus, setAppStatus]     = useState("Ready");
      const [running, setRunning]         = useState(false);
      const [canResume, setCanResume]     = useState(false);
      const [logs, setLogs]               = useState([{ ts:now(), type:"info", msg:"TRIM Web UI ready. Configure inputs and press Run All." }]);
      const consoleRef = useRef(null);
      const esRef      = useRef(null);
      const [tick, setTick] = useState(0);

      useEffect(() => { const t = setInterval(() => setTick(x=>x+1), 600); return () => clearInterval(t); }, []);
      useEffect(() => { if (consoleRef.current) consoleRef.current.scrollTop = consoleRef.current.scrollHeight; }, [logs]);

      // Auto-sync optional steps when GT or SG is enabled
      useEffect(() => {
        if (importGt && gtCsv.trim()) {
          setStepEnabled(prev => ({...prev, gt_standardize: true}));
        }
        setStepEnabled(prev => ({...prev, sg_smooth: useSg}));
      }, [importGt, gtCsv, useSg]);

      // Fetch status periodically (only when needed)
      useEffect(() => {
        // Only poll if we might need to check resume capability
        // (when not running and status might be paused)
        if (running) {
          // Don't poll while running (we get events via SSE)
          return;
        }

        const checkStatus = () => {
          fetch("/api/status")
            .then(r => r.json())
            .then(data => {
              if (data.can_resume && !running) {
                setCanResume(true);
              } else {
                setCanResume(false);
              }
            })
            .catch(() => {});
        };

        // Poll every 5 seconds when idle (reduced from 2s)
        const interval = setInterval(checkStatus, 5000);
        checkStatus(); // Initial check
        return () => clearInterval(interval);
      }, [running]);

      const addLog = (msg, type="info") => setLogs(prev => [...prev, { ts:now(), type, msg }]);

      const lightNet = () => netXml.trim().endsWith(".xml") ? "green" : netXml.trim() ? "red" : "gray";
      const lightFcd = () => fcdInput.trim().endsWith(".xml") ? "green" : fcdInput.trim() ? "red" : "gray";
      const lightOut = () => outDir.trim() ? "green" : "gray";
      const lightGt  = () => { if (!importGt) return "gray"; return gtCsv.trim().endsWith(".csv") ? "green" : "red"; };
      const isReady  = lightNet()==="green" && lightFcd()==="green" && lightOut()==="green" && lightGt()!=="red";

      const statusDotColor = () => ({ Done:"green", Error:"red", Stopped:"red", Paused:"amber", Running:"teal" }[appStatus] || "gray");

      function runPipeline(selectedOnly) {
        if (running) return;
        // Front-end validation
        const errs = [];
        if (!netXml.trim().endsWith(".xml"))  errs.push("net.xml path is missing or invalid");
        if (!fcdInput.trim().endsWith(".xml")) errs.push("fcd.xml path is missing or invalid");
        if (!outDir.trim())                    errs.push("output directory is not set");
        if (importGt && !gtCsv.trim().endsWith(".csv")) errs.push("Ground Truth CSV path is missing");

        // Time filter validation
        if (enableSumoTime) {
          const start = parseFloat(sumoTimeStart);
          const end = parseFloat(sumoTimeEnd);
          if (sumoTimeStart && sumoTimeEnd && start >= end) {
            errs.push("SUMO time filter: start must be less than end");
          }
        }
        if (enableGtTime) {
          const start = parseFloat(gtTimeStart);
          const end = parseFloat(gtTimeEnd);
          if (gtTimeStart && gtTimeEnd && start >= end) {
            errs.push("GT time filter: start must be less than end");
          }
        }

        if (errs.length > 0) {
          setTab("console");
          errs.forEach(e => addLog("⚠ " + e, "warn"));
          addLog("Please fix validation errors before running.", "error");
          return;
        }

        setRunning(true);
        setAppStatus("Running");
        setCanResume(false);
        setStepStatus(Object.fromEntries(STEPS.map(s => [s.id, "pending"])));
        setTab("pipeline");
        addLog("=== Pipeline started ===", "system");
        const safePrefix = prefix.trim().replace(/\s+/g,"_").replace(/[^A-Za-z0-9._-]+/g,"_").replace(/_+/g,"_").replace(/^[._-]+|[._-]+$/g,"") || "fcd";
        const axisBinVal = Math.max(0.1, parseFloat(axisbin)||10.0);
        addLog(`prefix: ${safePrefix}  |  axis: ${spatialAxis}  |  bin: ${axisBinVal}m`, "info");
        addLog(`pollutants: ${Object.keys(pollutants).filter(k=>pollutants[k]).join(", ")||"none"}`, "info");

        // Connect to FastAPI SSE
        const params = JSON.stringify({
          net_xml:netXml, fcd_input:fcdInput, out_dir:outDir,
          import_gt:importGt, gt_csv:gtCsv, prefix, use_sg:useSg,
          enable_plots:enablePlots, plot_limit:parseInt(plotLimit)||10,
          pollutants:Object.keys(pollutants).filter(k=>pollutants[k]),
          spatial_axis:spatialAxis, axis_bin_size:axisBinVal,
          spatial_enable_roi:enableRoi,
          spatial_roi_mode:roiMode,
          spatial_roi_sim:roiSim,
          spatial_roi_gt:roiGt,
          enable_sumo_time_filter:enableSumoTime,
          sumo_time_start:sumoTimeStart || null,
          sumo_time_end:sumoTimeEnd || null,
          enable_gt_time_filter:enableGtTime,
          gt_time_start:gtTimeStart || null,
          gt_time_end:gtTimeEnd || null,
          selected_only:selectedOnly,
        });

        fetch("/api/prepare", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: params,
        })
        .then(r => r.json())
        .then(({ token }) => {
          addLog(`📡 Connecting to backend (token: ${token.substring(0,8)}...)`, "info");
          const es = new EventSource(`/api/run?token=${token}`);
          esRef.current = es;

          let lastEventTime = Date.now();
          let heartbeatInterval = setInterval(() => {
            const elapsed = Math.floor((Date.now() - lastEventTime) / 1000);
            if (elapsed > 30) {
              addLog(`⚠️ No events received for ${elapsed}s - connection may be stalled`, "warn");
            }
          }, 10000); // Check every 10 seconds

          es.onopen = () => {
            addLog("✓ Connected to backend", "success");
            lastEventTime = Date.now();
          };

          es.onmessage = e => {
            lastEventTime = Date.now();
            // Skip heartbeat messages
            if (e.data.trim() === '' || e.data.startsWith(':')) return;

            const ev = JSON.parse(e.data);
            console.log('[SSE Event]', ev); // Debug log

            if (ev.type==="log")              addLog(ev.message);
            if (ev.type==="step_start")       { setStepStatus(p => ({...p,[ev.step_id]:"running"})); addLog(`▶ [${ev.step_id}] ${ev.message}`, "run"); }
            if (ev.type==="step_done")        { setStepStatus(p => ({...p,[ev.step_id]:"done"})); addLog(`✓ [${ev.step_id}] ${ev.message}`, "success"); }
            if (ev.type==="step_error")       { setStepStatus(p => ({...p,[ev.step_id]:"error"})); addLog(`✗ [${ev.step_id}] ${ev.message}`, "error"); }
            if (ev.type==="pipeline_done")    {
              clearInterval(heartbeatInterval);
              // Check if this is an error completion (validation or runtime error)
              const isError = ev.message.toLowerCase().includes('error') || ev.message.toLowerCase().includes('failed');
              addLog(ev.message, isError ? "error" : "success");
              setAppStatus(isError ? "Error" : "Done");
              setRunning(false);
              setCanResume(false);
              es.close();
            }
            if (ev.type==="pipeline_stopped") {
              clearInterval(heartbeatInterval);
              addLog(ev.message, "warn");
              setAppStatus("Paused");
              setRunning(false);
              setCanResume(true);
              es.close();
            }
          };

          es.onerror = (err) => {
            clearInterval(heartbeatInterval);
            console.log('[SSE Error]', err);
            addLog("❌ Connection error — check backend is running.", "error");
            setRunning(false);
            setAppStatus("Error");
            es.close();
          };
        })
        .catch(err => {
          console.error('[Fetch Error]', err);
          addLog("Failed to start pipeline: " + err, "error");
          setRunning(false); setAppStatus("Error");
        });
      }

      function resumePipeline() {
        if (running || !canResume) return;
        setRunning(true);
        setAppStatus("Running");
        setCanResume(false);
        addLog("=== Resuming pipeline ===", "system");

        fetch("/api/resume", { method:"POST" })
        .then(r => {
          if (!r.ok) throw new Error("Resume failed");
          addLog("📡 Reconnecting to backend for resume...", "info");
          return r;
        })
        .then(() => {
          const es = new EventSource("/api/resume");
          esRef.current = es;

          let lastEventTime = Date.now();
          let heartbeatInterval = setInterval(() => {
            const elapsed = Math.floor((Date.now() - lastEventTime) / 1000);
            if (elapsed > 30) {
              addLog(`⚠️ No events received for ${elapsed}s - connection may be stalled`, "warn");
            }
          }, 10000);

          es.onopen = () => {
            addLog("✓ Resumed connection established", "success");
            lastEventTime = Date.now();
          };

          es.onmessage = e => {
            lastEventTime = Date.now();
            if (e.data.trim() === '' || e.data.startsWith(':')) return;

            const ev = JSON.parse(e.data);
            console.log('[SSE Resume Event]', ev);

            if (ev.type==="log")              addLog(ev.message);
            if (ev.type==="step_start")       { setStepStatus(p => ({...p,[ev.step_id]:"running"})); addLog(`▶ [${ev.step_id}] ${ev.message}`, "run"); }
            if (ev.type==="step_done")        { setStepStatus(p => ({...p,[ev.step_id]:"done"})); addLog(`✓ [${ev.step_id}] ${ev.message}`, "success"); }
            if (ev.type==="step_error")       { setStepStatus(p => ({...p,[ev.step_id]:"error"})); addLog(`✗ [${ev.step_id}] ${ev.message}`, "error"); }
            if (ev.type==="pipeline_done")    {
              clearInterval(heartbeatInterval);
              // Check if this is an error completion
              const isError = ev.message.toLowerCase().includes('error') || ev.message.toLowerCase().includes('failed');
              addLog(ev.message, isError ? "error" : "success");
              setAppStatus(isError ? "Error" : "Done");
              setRunning(false);
              setCanResume(false);
              es.close();
            }
            if (ev.type==="pipeline_stopped") {
              clearInterval(heartbeatInterval);
              addLog(ev.message, "warn");
              setAppStatus("Paused");
              setRunning(false);
              setCanResume(true);
              es.close();
            }
          };

          es.onerror = () => {
            clearInterval(heartbeatInterval);
            addLog("Connection error during resume", "error");
            setRunning(false);
            setAppStatus("Error");
            es.close();
          };
        })
        .catch(err => {
          addLog("Failed to resume: " + err, "error");
          setRunning(false); setAppStatus("Error");
        });
      }

      function stopPipeline() {
        fetch("/api/stop", { method:"POST" });
        if (esRef.current) esRef.current.close();

        setCanResume(true);

                    <div>

                      {enableRoi ? (

                    fetch("/api/status").then(r=>r.json()).then(d => {
                      addLog(`📊 Backend Status: ${d.app_status}`, "info");

                    const badges = { system:"SYS", success:"DONE", error:"ERR", warn:"WARN", run:"RUN", info:"INFO" };
                    const badge = badges[l.type] || "LOG";
                    const badgeColor = logColor(l.type);
                    return (
                      <div key={i} style={{ display:"flex", gap:12, alignItems:"flex-start", marginBottom:1, padding:"3px 0" }}>
                        <span style={{ color:"#4a6070", flexShrink:0, fontSize:12, fontWeight:600, paddingTop:1, minWidth:62, letterSpacing:"0.03em" }}>{l.ts}</span>
                        <span style={{ color:badgeColor, flexShrink:0, fontSize:11, fontWeight:700, minWidth:40, paddingTop:1, letterSpacing:"0.06em" }}>{badge}</span>
                        <span style={{ color:logColor(l.type), flex:1, wordBreak:"break-word", whiteSpace:"pre-wrap", opacity: l.type==="info" ? 0.88 : 1 }}>{l.msg}</span>
                      </div>
                    );
                  })}
                  {running && (
                    <div style={{ display:"flex", gap:10, alignItems:"center", marginTop:4, opacity:0.7 }}>
                      <span style={{ color:"#4a6070", fontSize:12, fontWeight:600, minWidth:62 }}>{now()}</span>
                      <span style={{ color:"#38bdf8", fontSize:10, fontWeight:700, minWidth:36 }}>RUN</span>
                      <span style={{ color:"#67e8f9" }}>Pipeline running{tick%3===0?"   ":tick%3===1?".  ":".. "}</span>
                    </div>
                  )}
                </div>
                <div style={{ marginTop:10, display:"flex", gap:20, padding:"10px 18px", background:C.white, border:`1px solid ${C.border}`, borderRadius:8, alignItems:"center" }}>
                  {[{label:"Total logs",val:logs.length,color:C.textMd},{label:"Steps done",val:Object.values(stepStatus).filter(s=>s==="done").length,color:C.green},{label:"Errors",val:Object.values(stepStatus).filter(s=>s==="error").length,color:C.red}].map(({label,val,color}) => (
                    <div key={label} style={{ display:"flex", alignItems:"baseline", gap:8 }}>
                      <span style={{ fontFamily:"DM Sans, sans-serif", fontWeight:800, fontSize:18, color }}>{val}</span>
                      <span style={{ color:C.textMute, fontSize:11, fontFamily:"DM Mono, monospace" }}>{label}</span>
                    </div>
                  ))}
                  <div style={{ marginLeft:"auto" }}>
                    <Btn variant="ghost" small onClick={() => setTab("pipeline")}>← Back to Pipeline</Btn>
                  </div>
                </div>
              </div>
            )}
          </main>

          {/* Footer */}
          <footer style={{ borderTop:`1px solid ${C.border}`, padding:"10px 32px", background:C.white, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <span style={{ color:C.textMute, fontSize:11, fontFamily:"DM Mono, monospace" }}>TRIM v1.0 · Trajectory Refinement for Emission Modeling</span>
            <div style={{ display:"flex", gap:8 }}>
              {Object.keys(pollutants).filter(k=>pollutants[k]).map(p => (
                <span key={p} style={{ background:C.tealLight, color:C.tealDark, border:`1px solid ${C.borderHi}`, borderRadius:10, padding:"2px 9px", fontSize:10, fontFamily:"DM Mono, monospace", fontWeight:600 }}>{p}</span>
              ))}
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
